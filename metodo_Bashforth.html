<!DOCTYPEDOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practica 7</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-5 bg-light text-center">
    <div class="card mx-auto" style="max-width: 600px;">
        <div class="card-body">
            <h3 class="card-title">Metodos de pasos múltiples</h3>
            <p>Predicción del clima con el método de Adams-Bashforth</p>
            
            <div class="row g-2 mb-3 text-start">
                <div class="col-4"> <label>Clima hace hora:</label>
                    <input type="number" id="p1">
                </div>
                <div class="col-4"> <label>Clima hace media hora:</label>
                    <input type="number" id="p2">
                </div>
                <div class="col-4"> <label>Clima actualmente:</label>
                    <input type="number" id="p3">
                </div>
            </div>
            
            <button class="btn btn-primary" onclick="calcularClima()">
                Predecir clima
            </button>
            
            <div class="alert alert-info py-3 mt-3">
                <h5>Clima predecido: <strong id="idClima"></strong></h5>
                <h4 id="condicionEsperada" class="mt-2">...</h4>
            </div>
        </div>
    </div>

    <script>
        function calcularClima(){
            let hora1 = parseFloat(document.getElementById("p1").value);
            let hora2 = parseFloat(document.getElementById("p2").value);
            let hora3 = parseFloat(document.getElementById("p3").value);

            let historial = [hora1, hora2, hora3];
            let cambio1 = historial[1] - historial[0];
            let cambio2 = historial[2] - historial[1];

            //aplicar el metodo de multiples pasos
            let cambioFinal = (1.5 * cambio2) + (0.5 * cambio1);
            
            //predecir el siguiente cambio de clima
            let climaFuturo = historial[2] + cambioFinal;
            
            //mostrar los resultados
            document.getElementById("idClima").innerText = climaFuturo.toFixed(1);

            let tarjetaCondicion = document.getElementById("condicionEsperada");
            if(cambioFinal < 20){
                tarjetaCondicion.innerText = "Se esperan tormentas";
            } else if (cambioFinal > 30){
                tarjetaCondicion.innerText = "Clima soleado";
            } else {
                tarjetaCondicion.innerText = "Clima inestable";
            }
        }
    </script>
</body>
</html>
